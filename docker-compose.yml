services:
  postgres:
    image: postgres:15
    container_name: gametracker-postgres
    security_opt:
      - seccomp:unconfined
    environment:
      POSTGRES_DB: gametracker
      POSTGRES_USER: gametracker
      POSTGRES_PASSWORD: gametracker
    ports:
      - "5432:5432"
    volumes:
      - gametracker-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gametracker -d gametracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gametracker-pgdata:
